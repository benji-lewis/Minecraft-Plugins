name: Build CreeperConsent

on:
  push:
    branches: [ main ]
    paths:
      - 'CreeperConsent/**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: CreeperConsent/pom.xml

      - name: Build CreeperConsent
        run: cd CreeperConsent && mvn clean package -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CreeperConsent
          path: CreeperConsent/target/CreeperConsent-*.jar
          retention-days: 90
