name: Build Green Party Dimension

on:
  push:
    branches:
      - main
    paths:
      - 'GreenPartyDimension/src/**'
      - 'GreenPartyDimension/pom.xml'
      - '.github/workflows/greenpartydimension.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'GreenPartyDimension/src/**'
      - 'GreenPartyDimension/pom.xml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [21]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd GreenPartyDimension
          mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenPartyDimension-plugin
          path: GreenPartyDimension/target/GreenPartyDimension-*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Create Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'green')
        uses: softprops/action-gh-release@v1
        with:
          files: GreenPartyDimension/target/GreenPartyDimension-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## Green Party Dimension Build ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact**: GreenPartyDimension-1.4.5.jar" >> $GITHUB_STEP_SUMMARY
          echo "**Java Version**: ${{ matrix.java-version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Ready for testing" >> $GITHUB_STEP_SUMMARY
